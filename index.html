<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday Soumo ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Animated Stars -->
    <div class="stars"></div>

    <!-- Falling Rose Petals -->
    <div id="petals"></div>

    <!-- Gift Screen -->
    <div id="giftSection" class="gift-section">

        <h1>🎁</h1>

        <h2>A Special Gift For You</h2>

        <p>Click the button below ❤️</p>

        <button id="openGift">Open Gift</button>

    </div>

    <!-- Main Content -->
    <div id="mainContent">

        <img src="our-photo.jpg" class="photo" alt="Our Photo">

        <h1 class="title">
            🎉 Happy Birthday Soumo 🎉
        </h1>

        <h2 class="subtitle">
            ❤️ My Favorite Person ❤️
        </h2>

        <p id="typewriter" class="message"></p>

        <button id="playBtn">
            🎵 Play Music
        </button>

        <!-- Footer at End -->
        <footer class="footer">
            Made with ❤️ just for You
        </footer>

    </div>

    <!-- Floating Hearts -->
    <div class="heart h1">❤️</div>
    <div class="heart h2">💕</div>
    <div class="heart h3">💖</div>
    <div class="heart h4">💗</div>
    <div class="heart h5">💞</div>

    <!-- Music -->
    <audio id="music" loop>
        <source src="birthday-song.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>

</html>
